name: OrbisX
options:
  bundleIdPrefix: dk.holmstadit
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: "58Z296VH22"
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "0.2.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  OrbisX:
    type: application
    platform: iOS
    sources:
      - path: Sources/OrbisX
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dk.holmstadit.orbisx
        TARGETED_DEVICE_FAMILY: "1"
        ENABLE_PREVIEWS: YES
    info:
      path: Sources/OrbisX/Info.plist
      properties:
        CFBundleDisplayName: OrbisX
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
        UIBackgroundModes:
          - fetch
          - processing
        BGTaskSchedulerPermittedIdentifiers:
          - dk.holmstadit.orbisx.refresh
